<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zara</title>
    <script src="https://kit.fontawesome.com/4013ed0f94.js" crossorigin="anonymous"></script>
    <script src="JS/script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>
     <style>
        .field-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .field-error {
            display: none;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            color: #c0392b;
            margin-top: 4px;
            margin-bottom: 2px;
            min-height: 1.1em;
            animation: fadeInError 0.18s ease;
        }

        .field-error.visible {
            display: flex;
        }

        .field-error i {
            font-size: 0.78rem;
            flex-shrink: 0;
        }

        @keyframes fadeInError {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .contact-form input.invalid,
        .contact-form textarea.invalid {
            border-color: #c0392b !important;
            background-color: #fff5f5 !important;
            outline-color: #c0392b !important;
        }

        .contact-form input.valid,
        .contact-form textarea.valid {
            border-color: #27ae60 !important;
            background-color: #f5fff8 !important;
            outline-color: #27ae60 !important;
        }

        .char-counter {
            font-size: 0.75rem;
            color: #888;
            text-align: right;
            margin-top: 2px;
        }

        .char-counter.near-limit { color: #e67e22; }
        .char-counter.at-limit   { color: #c0392b; font-weight: 700; }
    </style>
</head>
<body>
    <header class="header">
        <div class="main-header">
            <div class="navmenu hidden">
                <nav class="navMenuLinks">
                    <a href="index.html">Home</a>
                    <a href="women.html">Womens</a>
                    <a href="mens.html">Mens</a>
                    <a href="kids.html">Kids</a>
                    <a href="beautySection.html">Beauty</a>
                    <a href="travel.html">Travel</a>
                    <a href="homeDecor.html">Home Decor</a>
                </nav>
            </div>
            <a href="#" class="icon" id="hamburgerMenu">
                <i class="fa-solid fa-bars"></i>
            </a>
            <div class="logo"><a href="index.html">Zara</a></div>

            <!--Header Icons-->
            <div class="header-icons">
                <a href='#'><i class="fa-regular fa-circle-user"></i></a>
                <a href='#'><i class="fa-regular fa-heart"></i></a>
                <a href='shoppingCart.html'><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </div>
        <div class="desktop-nav">
            <nav class="desktop-nav-list">
                <ul>
                    <li><a href="women.html">Women's</a></li>
                    <li><a href="mens.html">Men's</a></li>
                    <li><a href="kids.html">Kids</a></li>
                    <li><a href="beautySection.html">Beauty</a></li>
                    <li><a href="travel.html">Travel</a></li>
                    <li><a href="homeDecor.html">Home Decor</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="contact-container">
        <i class="fa-solid fa-chevron-left" onclick="history.back()"></i>
        <div>
        <h1>Contact Us</h1>
        <h2>We'll get back to you within 24 Hours!</h2>

        <form id="contactForm" class="contact-form" novalidate>
            <label for="name">Name</label>
            <div class="field-wrapper">
                <input
                    type="text"
                    id="name"
                    name="name"
                    minlength="3"
                    maxlength="240"
                    placeholder="Your Name"
                    autocomplete="name"
                    required
                >
                <span class="field-error" id="name-error" role="alert" aria-live="polite">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span class="error-text"></span>
                </span>
            </div>

            <label for="email">Email</label>
            <div class="field-wrapper">
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                >
                <span class="field-error" id="email-error" role="alert" aria-live="polite">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span class="error-text"></span>
                </span>
            </div>

            <label for="message">Message</label>
            <div class="field-wrapper">
                <textarea
                    id="message"
                    name="message"
                    rows="5"
                    minlength="10"
                    maxlength="1000"
                    placeholder="Write your message here..."
                    required
                ></textarea>
                <span class="field-error" id="message-error" role="alert" aria-live="polite">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span class="error-text"></span>
                </span>
                <span class="char-counter" id="message-counter">0 / 1000</span>
            </div>

            <button type="submit">Send Message</button>
        </form>
        </div>
    </main>

           
    <footer class="footer">
        <a href="contact.html">Contact info</a>
        <a href="review.html">Leave a Review</a>
        <div class="footer-right">
            <button class="icon-btn" title="Toggle dark mode" id="darkModeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="icon-btn" title="Help">
                <i class="fa-solid fa-circle-question"></i>
            </button>
        </div>
    </footer>
    <script>
        const validators = {
            name: (value) => {
                if (!value.trim())             return 'Please enter your name.';
                if (value.trim().length < 3)   return 'Name must be at least 3 characters.';
                if (value.trim().length > 240) return 'Name must be 240 characters or fewer.';
                return null;
            },
            email: (value) => {
                if (!value.trim())             return 'Please enter your email address.';
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
                if (!emailPattern.test(value.trim())) return 'Enter a valid email address (e.g. you@example.com).';
                return null;
            },
            message: (value) => {
                if (!value.trim())            return 'Please write a message before sending.';
                if (value.trim().length < 10) return `Message is too short — add at least ${10 - value.trim().length} more character(s).`;
                if (value.length > 1000)      return 'Message must be 1,000 characters or fewer.';
                return null;
            }
        };
        function showError(fieldId, message) {
            const input   = document.getElementById(fieldId);
            const errorEl = document.getElementById(`${fieldId}-error`);
            errorEl.querySelector('.error-text').textContent = message;
            errorEl.classList.add('visible');
            input.classList.add('invalid');
            input.classList.remove('valid');
            input.setAttribute('aria-invalid', 'true');
        }

        function clearError(fieldId) {
            const input   = document.getElementById(fieldId);
            const errorEl = document.getElementById(`${fieldId}-error`);
            errorEl.classList.remove('visible');
            input.classList.remove('invalid');
            input.setAttribute('aria-invalid', 'false');
        }
           function markValid(fieldId) {
            clearError(fieldId);
            document.getElementById(fieldId).classList.add('valid');
        }

        function validateField(fieldId) {
            const input = document.getElementById(fieldId);
            const error = validators[fieldId](input.value);
            if (error) { showError(fieldId, error); return false; }
            else        { markValid(fieldId);        return true;  }
        }

        ['name', 'email', 'message'].forEach(id => {
            const el = document.getElementById(id);

            el.addEventListener('input', () => {
                if (el.dataset.touched === 'true') {
                    validateField(id);
                } else {
                    if (el.value.trim()) clearError(id);
                }
            });
            el.addEventListener('blur', () => {
                el.dataset.touched = 'true';
                validateField(id);
            });
        });
        const messageEl = document.getElementById('message');
        const counterEl = document.getElementById('message-counter');

        messageEl.addEventListener('input', () => {
            const len = messageEl.value.length;
            counterEl.textContent = `${len} / 1000`;
            counterEl.classList.toggle('near-limit', len >= 900 && len < 1000);
            counterEl.classList.toggle('at-limit',   len >= 1000);
        });
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            ['name', 'email', 'message'].forEach(id => {
                document.getElementById(id).dataset.touched = 'true';
            });

            const allValid = ['name', 'email', 'message'].every(id => validateField(id));

            if (!allValid) {
                e.preventDefault();
                const firstInvalid = document.querySelector('.contact-form input.invalid, .contact-form textarea.invalid');
                if (firstInvalid) firstInvalid.focus();
            }
        });
    </script>
</body>
</html>
