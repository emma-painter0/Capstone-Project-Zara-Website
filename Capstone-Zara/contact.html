<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <script src="https://kit.fontawesome.com/4013ed0f94.js" crossorigin="anonymous"></script>
    <script src="JS/script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="navmenu hidden">
            <nav class="navMenuLinks">
                <a href="index.html">Home</a>
                <a href="women.html">Womens</a>
                <a href="mens.html">Mens</a>
                <a href="kids.html">Kids</a>
                <a href="beautySection.html">Beauty</a>
                <a href="travel.html">Travel</a>
                <a href="homeDecor.html">Home Decor</a>
            </nav>
        </div>
        <a href="#" class="icon" id="hamburgerMenu">
            <i class="fa-solid fa-bars"></i>
        </a>
        <div class="logo"><a href="index.html">Zara</a></div>

         <!--Header Icons-->
       <div class="header-icons">
           <a href='#'><i class="fa-regular fa-circle-user"></i></a>
           <a href='#'><i class="fa-regular fa-heart"></i></a>
           <a href='shoppingCart.html'><i class="fa-solid fa-cart-shopping"></i></a>
          
       </div>

    </header>
    <main class="contact-container">
        <h1>Contact Us</h1>
        <h2>We'll get back to you within 24 Hours!</h2>

        <form id="contactForm" class="contact-form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" minlength="3" maxlength="240" placeholder="Your Name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" minlength="5" placeholder="you@example.com" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" minlength="1" maxlength="1000" placeholder="Write your message here..." required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </main>
    <footer class="footer">
        <a href="contact.html">Contact info</a>
        <a href="review.html">Leave a Review</a>
        <div class="footer-right">
            <button class="icon-btn" title="Toggle dark mode" id="darkModeToggle">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="icon-btn" title="Help">
                <i class="fa-solid fa-circle-question"></i>
            </button>
        </div>
    </footer>
</body>
</html>
